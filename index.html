/* ====== BODY ====== */
/* =======================

/* ==============================
   BODY & BACKGROUND
   ============================== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('https://www.exitlag.com/blog/wp-content/uploads/2025/11/how-to-increase-fps-in-battlefield-6-1024x576.webp') no-repeat center center/cover;
  color: #e0e0e0;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
  position: relative;
}

/* Dark overlay for readability */
body::before {
  content: '';
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.65);
  z-index: -1;
}

/* ==============================
   HEADER & NAVIGATION
   ============================== */
header {
  position: sticky;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(15,15,25,0.95);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem;
  border-bottom: 2px solid #ff4c00;
  box-sizing: border-box;
  z-index: 999;
}

header h1 {
  color: #ff4c00;
  font-size: 2rem;
  text-shadow: 0 0 8px #ff4c00, 0 0 20px #ff0000;
  margin: 0;
}

/* NAV LINKS */
nav.nav-links {
  display: flex;
  gap: 1rem;
}

nav.nav-links a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 0.3rem 0.6rem;
  border-radius: 8px;
  transition: all 0.3s ease;
}

nav.nav-links a:hover {
  color: #ff4c00;
  text-shadow: 0 0 10px #ff4c00, 0 0 20px #ff0000;
  background: rgba(255,255,255,0.05);
}

/* HAMBURGER MENU */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.hamburger span {
  width: 28px;
  height: 3px;
  background: #ff4c00;
  border-radius: 2px;
  transition: 0.3s;
}

/* HAMBURGER ACTIVE (X) */
.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px){
  nav.nav-links {
    display: none;
    flex-direction: column;
    width: 100%;
    position: absolute;
    top: 100%;
    left: 0;
    background: rgba(15,15,25,0.95);
    padding: 1rem 0;
    z-index: 998;
  }
  nav.nav-links.show {
    display: flex;
  }
  .hamburger {
    display: flex;
  }
}

/* ==============================
   MAIN SECTIONS
   ============================== */
main {
  padding: 3rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

section {
  width: 95%;
  max-width: 750px;
  background: rgba(20, 20, 30, 0.85);
  border-radius: 25px;
  margin: 2rem 0;
  padding: 2.5rem;
  box-shadow: 0 20px 40px rgba(0,0,0,0.7);
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

section h2 {
  font-family: 'Raleway', sans-serif;
  font-size: 2rem;
  color: #ff4c00;
  text-shadow: 0 0 8px #ff4c00, 0 0 20px #ff0000;
  margin-bottom: 2rem;
}

/* ==============================
   INPUTS & BUTTONS
   ============================== */
input {
  padding: 0.85rem 1rem;
  font-size: 1rem;
  width: 70%;
  border-radius: 15px;
  border: 2px solid #ff4c00;
  margin-right: 0.5rem;
  outline: none;
  background: rgba(0,0,0,0.4);
  color: #fff;
  transition: all 0.3s ease;
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

input:focus {
  border-color: #ff0000;
  box-shadow: 0 0 15px #ff4c00, 0 0 25px #ff0000;
}

button.main-btn {
  padding: 0.85rem 1.3rem;
  font-size: 1rem;
  background: #ff4c00;
  color: #fff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  font-weight: 600;
  box-shadow: 0 8px 25px rgba(255,76,0,0.6);
  transition: all 0.3s ease, transform 0.2s ease;
}

button.main-btn:hover {
  transform: scale(1.08);
  background: #ff0000;
  box-shadow: 0 10px 30px rgba(255,0,0,0.7), 0 0 20px #ff4c00 inset;
}

/* ==============================
   NAME LIST
   ============================== */
.name-list {
  max-height: 300px;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 5px;
  scrollbar-width: thin;
  scrollbar-color: #ff4c00 #111;
}

.name-list div {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1rem;
  margin-bottom: 0.7rem;
  background: rgba(30,30,40,0.9);
  border-radius: 18px;
  box-shadow: 5px 5px 20px rgba(0,0,0,0.6);
  transition: all 0.3s ease, transform 0.3s ease;
}

.name-list div:hover {
  transform: translateX(8px);
  background: #111;
  box-shadow: 0 0 25px #ff4c00, 0 0 40px #ff0000 inset;
}

.name-list button.copy-btn {
  background: #ff4c00;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 0.5rem 0.9rem;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease, transform 0.2s ease;
}

.name-list button.copy-btn:hover {
  background: #ff0000;
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(255,0,0,0.7), 0 0 15px #ff4c00 inset;
}

/* SCROLLBAR STYLING (Webkit) */
.name-list::-webkit-scrollbar {
  width: 8px;
}
.name-list::-webkit-scrollbar-track {
  background: #111;
  border-radius: 8px;
}
.name-list::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #ff4c00, #ff0000);
  border-radius: 8px;
  box-shadow: 0 0 5px #ff4c00;
}
.name-list::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #ff0000, #ff4c00);
}

/* ==============================
   TOGGLE CHECKBOX
   ============================== */
.toggle-container {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.toggle-container input[type="checkbox"] {
  appearance: none;
  width: 50px;
  height: 26px;
  background: #111;
  border: 2px solid #ff4c00;
  border-radius: 50px;
  position: relative;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px #ff4c00 inset;
}

.toggle-container input[type="checkbox"]::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 22px;
  height: 22px;
  background: #ff4c00;
  border-radius: 50%;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px #ff0000, 0 0 12px #ff4c00 inset;
}

.toggle-container input[type="checkbox"]:checked {
  background: #111;
  border-color: #00ffe0;
  box-shadow: 0 0 12px #00ffe0 inset, 0 0 15px #00ffea;
}

.toggle-container input[type="checkbox"]:checked::before {
  left: 26px;
  background: #00ffe0;
  box-shadow: 0 0 12px #00ffe0, 0 0 15px #00ffea inset;
}

.toggle-container label {
  color: #ff4c00;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  font-size: 1rem;
  text-shadow: 0 0 8px #ff4c00, 0 0 12px #ff0000;
}

/* ==============================
   POPUPS
   ============================== */
#copyPopup, #errorPopup {

.name-list button.fav-btn.favorited {
  background: #ff4c00;
  color: #fff;
  text-shadow: 0 0 8px #ff4c00, 0 0 15px #ff0000;
  box-shadow: 0 5px 15px rgba(255,76,0,0.6), 0 0 25px #ff0000 inset;
  animation: pulse 1.2s infinite alternate;
}

.name-list button.fav-btn:hover {
  transform: scale(1.1);
}

  0% { transform: scale(1); box-shadow: 0 0 15px #ff4c00, 0 0 25px #ff0000 inset; }
  50% { transform: scale(1.08); box-shadow: 0 0 25px #ff4c00, 0 0 40px #ff0000 inset; }
  100% { transform: scale(1); box-shadow: 0 0 15px #ff4c00, 0 0 25px #ff0000 inset; }
}

function showError(message){

    popup.innerText = message;
    popup.style.opacity = "1";

// ======================
// COPY FUNCTION
// ======================
function copyText(text){
    navigator.clipboard.writeText(text);
    const popup = document.getElementById("copyPopup");
    popup.innerText = `Copied: ${text}`;
    popup.style.opacity = "1";
    popup.style.transform = "translate(-50%, -50%) scale(1.2)";

    setTimeout(() => popup.style.transform = "translate(-50%, -50%) scale(1)", 200);
    setTimeout(() => {
        popup.style.opacity = "0";
        popup.style.transform = "translate(-50%, -50%) scale(0)";
    }, 1200);
}
const sections = document.querySelectorAll("section");

function revealSections() {
  const triggerBottom = window.innerHeight / 1.2;

  sections.forEach(section => {
    const sectionTop = section.getBoundingClientRect().top;
    if(sectionTop < triggerBottom){
      section.classList.add("show");
    }
  });
}

window.addEventListener("scroll", revealSections);
window.addEventListener("load", revealSections);
// ======================
// DISPLAY FUNCTION
// ======================
function displayNames(arr, container){
    container.innerHTML = "";
    const unique = [...new Set(arr)];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

    unique.forEach(name => {
        const div = document.createElement("div");
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.alignItems = "center";

        // Name span
        const span = document.createElement("span");
        span.innerText = name;
        span.style.cursor = "pointer";
        if(!plainToggle.checked){
            span.style.fontFamily = fonts[Math.floor(Math.random()*fonts.length)];
        }
        span.onclick = () => copyText(name);

        // Copy button
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerText = "Copy";
        copyBtn.onclick = () => copyText(name);

        // Favorite button
        const favBtn = document.createElement("button");
        favBtn.className = "copy-btn";
        favBtn.style.marginLeft = "5px";
        
        // Detect mobile screen
        const isMobile = window.innerWidth <= 768;
        const isFav = favorites.includes(name);
        favBtn.innerHTML = isFav ? "⭐" : "☆"; // filled or empty star
        favBtn.style.background = isFav ? "#ff4c00" : "#00ffe0";

        favBtn.onclick = () => {
            toggleFavoriteMobile(name, favBtn);
        };

        div.appendChild(span);
        div.appendChild(copyBtn);
        div.appendChild(favBtn);
        container.appendChild(div);
    });
}

// STYLISH GENERATOR
// ======================
function generateStylish(){
    const name = document.getElementById("nameInput").value.trim();
    if(!name) return showError("Please enter a name!"); // <-- replace alert

    let styles = [];
    if(plainToggle.checked){
        styles.push(name, name.toUpperCase(), name.toLowerCase(), name.split("").join(" "), name.split("").reverse().join(""));
    } else {
        for(let i=0;i<50;i++){
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const b = brackets[Math.floor(Math.random()*brackets.length)];
            styles.push(`${b}${s}${name}${s}${b}`);
        }
        styles.push(name, name.toUpperCase(), name.toLowerCase(), name.split("").join(" "), name.split("").reverse().join(""));
    }

    displayNames(styles, document.getElementById("outputStylish"));
}
// ======================
// PRO GENERATOR
// ======================
function generatePro(){
    const name = document.getElementById("proInput").value.trim();
    if(!name) return showError("Please enter a name!"); //
    let list = [];

    if(plainToggle.checked){
        list.push(name, name.toUpperCase(), name.toLowerCase());
    } else {
        proPrefixes.forEach(pre => {
            proSuffixes.forEach(suf => {
                list.push(`${pre}${name}${suf}`);
            });
        });
    }

    displayNames(list, document.getElementById("outputPro"));
}

    let list = [];

    for(let i=0;i<10;i++){
        const name = randomBase[Math.floor(Math.random()*randomBase.length)];
        if(plainToggle.checked){
            list.push(name);
        } else {
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const b = brackets[Math.floor(Math.random()*brackets.length)];
            list.push(`${b}${s}${name}${s}${b}`);
        }
    }

    displayNames(list, document.getElementById("outputRandom"));
}

  ham.classList.toggle("active"); // animate hamburger
  nav.classList.toggle("show");   // show/hide nav links

function addFavorite(name){
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

    if(!favorites.includes(name)){
        favorites.push(name);
        localStorage.setItem("favorites", JSON.stringify(favorites));
        showPopup(`Added to Favorites: ${name}`);
    } else {
        showPopup(`${name} is already in Favorites!`);
    }
}
function toggleFavorite(name, btn){
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

    if(favorites.includes(name)){
        favorites = favorites.filter(n => n !== name);
        btn.style.background = "#00ffe0";
        btn.innerHTML = "♡ Favorite";
        showPopup(`Removed from Favorites: ${name}`);
    } else {
        favorites.push(name);
        btn.style.background = "#ff4c00";
        btn.innerHTML = "♥ Favorited";
        showPopup(`Added to Favorites: ${name}`);
    }

    localStorage.setItem("favorites", JSON.stringify(favorites));
}

// Custom popup
function showPopup(message){
    let popup = document.getElementById("favPopup");
    if(!popup){
        popup = document.createElement("div");
        popup.id = "favPopup";
        popup.style.position = "fixed";
        popup.style.top = "50%";
        popup.style.left = "50%";
        popup.style.transform = "translate(-50%, -50%) scale(0)";
        popup.style.background = "rgba(20,20,30,0.95)";
        popup.style.color = "#ff4c00";
        popup.style.padding = "1rem 2rem";
        popup.style.borderRadius = "20px";
        popup.style.fontWeight = "bold";
        popup.style.zIndex = "9999";
        popup.style.textAlign = "center";
        popup.style.boxShadow = "0 10px 30px rgba(255,76,0,0.6), 0 0 20px #ff0000 inset";
        popup.style.transition = "transform 0.3s ease, opacity 0.3s ease";
        document.body.appendChild(popup);
    }

    popup.innerText = message;
    popup.style.opacity = "1";
    popup.style.transform = "translate(-50%, -50%) scale(1.2)";

    setTimeout(() => popup.style.transform = "translate(-50%, -50%) scale(1)", 200);
    setTimeout(() => {
        popup.style.opacity = "0";
        popup.style.transform = "translate(-50%, -50%) scale(0)";
    }, 1500);
}
function toggleFavoriteMobile(name, btn){

    if(favorites.includes(name)){
        favorites = favorites.filter(n => n !== name);
