<script>
// ==== DATA ====
// International + Indian + Pakistani YouTubers
const names = [
"MrBeast","PewDiePie","Ninja","Dream","Jacksepticeye","Markiplier","Shroud",
"Vikkstar123","Technoblade","DanTDM","SSSniperWolf","Pokimane","Lilly Singh",
"James Charles","Logan Paul","KSI","Ryan Higa","Casey Neistat","Emma Chamberlain",
"Liza Koshy","Smosh","Dude Perfect","VanossGaming","Faze Rug","PrestonPlayz","Ali-A",
"RiceGum","Miniminter","MrBeast Gaming","Vlogger Sam","Epic Gamer","Daily Fun",
"Vlog King","Ultra Gamer","Crazy Vlogs","Vlog Squad","Adventure Vlogger","GamerLife",
"VloggerPro","StreamMaster","MooseCraft","FGTeeV","H2ODelirious","PopularMMOs",
"Jacky Chan","Superwoman","Colleen Ballinger","Good Mythical Morning","Jelly",
"StampyLonghead","LDShadowLady","ItsFunneh","CaptainSparklez","ExplodingTNT",
"YOGSCAST","SSundee","SkyDoesMinecraft","Dan Howell","Phil Lester","Danisnotonfire",
"Joey Graceffa","Shane Dawson","Zoella","Wengie","Marques Brownlee","Unbox Therapy",
"Linus Tech Tips","iJustine","Austin Evans","Mrwhosetheboss","Troom Troom",
"The Try Guys","Binging with Babish","Safiya Nygaard","RCLBeauty101","Rosanna Pansino",
"NikkieTutorials","Bethany Mota",
// Indian YouTubers
"CarryMinati","Ashish Chanchlani","BB Ki Vines","Technical Guruji","Round2hell","ajjubhai",
"Flying Beast","Mumbiker Nikhil","Harsh Beniwal","Amit Bhadana","Gaurav Chaudhary",
"Emiway Bantai","Slayy Point","Geeky Ranjit","NishaMadhulika","Prajakta Koli",
// Pakistani YouTubers
"Irfan Junejo","Sham Idrees","Amir Liaquat","Mooroo","Zaid Ali T","Ducky Bhai",
"Shahveer Jafry","Sami Shah","Kanwal Aftab","Asad Ali TV"
];

const symbols = ["★","✦","✧","✩","✪","✿","❖","⚡","☀","☆","➹","✰","☯","☁","🔥","☾"];
const fonts = [
  "Creepster","Monoton","Orbitron","Pirata One","Audiowide",
  "Bangers","Rye","Pacifico","Press Start 2P","Russo One","Baloo Tamma 2",

  "Anton","Exo 2","Rajdhani","Oswald","Play",
  "Kanit","Titillium Web","Orbit","Share Tech","Chakra Petch"
];

let selectedFont = "Creepster";

const fontPicker = document.getElementById("fontPicker");

// create font boxes
fonts.forEach(font=>{
  const div = document.createElement("div");
  div.className = "font-box";
  div.innerText = "Epic";
  div.style.fontFamily = font;
  div.style.letterSpacing = Math.random() * 2 + "px";
  if(font === selectedFont){
    div.classList.add("active");
  }

  div.onclick = ()=>{
    selectedFont = font;

    // remove active
    document.querySelectorAll(".font-box").forEach(el=>el.classList.remove("active"));

    // add active
    div.classList.add("active");

    displayNames(names);
  };

  fontPicker.appendChild(div);
});

const nameListDiv = document.getElementById("nameList");
const searchBar = document.getElementById("searchBar");
const copyPopup = document.getElementById("copyPopup");
const symbolSelect = document.getElementById("symbolSelect");


function displayNames(list){
  nameListDiv.innerHTML = "";
  const selectedSymbol = symbolSelect.value;

  list.forEach(name=>{
    const div = document.createElement("div");
    div.className = "name-item";

    const span = document.createElement("span");

    const finalName = `${selectedSymbol} ${name} ${selectedSymbol}`;

    span.innerText = finalName;
    span.style.fontFamily = selectedFont;

    span.onclick = ()=>copyText(finalName);

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerText = "Copy";
    btn.onclick = ()=>copyText(finalName);

    div.appendChild(span);
    div.appendChild(btn);
    nameListDiv.appendChild(div);
  });
}

// ==== COPY ====
function copyText(text){
  navigator.clipboard.writeText(text);
  copyPopup.innerText = `Copied: ${text}`;
  copyPopup.style.transform = "translate(-50%, -50%) scale(1.2)";
  copyPopup.style.opacity = "1";
  setTimeout(()=>{
    copyPopup.style.transform = "translate(-50%, -50%) scale(1)";
  },200);
  setTimeout(()=>{
    copyPopup.style.transform = "translate(-50%, -50%) scale(0)";
    copyPopup.style.opacity = "0";
  },1200);
}

// ==== SEARCH & FILTER ====
searchBar.addEventListener("input", ()=>{
  const query = searchBar.value.toLowerCase();
  const filtered = names.filter(name=>name.toLowerCase().includes(query));
  displayNames(filtered);
});

// ==== SYMBOL & FONT CHANGE ====
symbolSelect.addEventListener("change", ()=>displayNames(names));


// ==== INITIAL DISPLAY ====
displayNames(names);
</script>
